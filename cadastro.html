<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sensor Soil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600&family=Montserrat:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <div class="background-curve"></div>
    <div class="cadastro-container">
        <header>
            <div class="logo-area">
                <img src="logo.png" alt="Logo" class="mini-logo">
                <p class="brand-small">SENSOR SOIL</p>
            </div>
            <h1 class="main-title">Crie uma conta</h1>
            <p class="subtitle">Preencha seus dados para começar</p>
        </header>

        <form class="cadastro-form" id="cadastroForm">
            <div class="input-group">
                <span class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </span>
                <input type="text" id="nome" placeholder="Nome Completo" required>
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </span>
                <input type="email" id="email" placeholder="E-mail" required>
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 10V3M12 3L9 6M12 3L15 6" stroke-width="2"/>
                        <path d="M5 21H19V17C19 14.2386 16.7614 12 14 12H10C7.23858 12 5 14.2386 5 17V21Z" stroke-width="2"/>
                        <path d="M12 12V15" stroke-width="2"/>
                    </svg>
                </span>
                <input type="text" id="fazenda" placeholder="Nome da Fazenda/Lote" required>
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" id="senha" placeholder="Crie uma Senha" required>
                <button type="button" class="toggle-password" onclick="togglePassword('senha', 'eye-senha')">
                    <svg id="eye-senha" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>

            <div class="input-group">
                <span class="icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                </span>
                <input type="password" id="confirmarSenha" placeholder="Confirme a Senha" required>
                <button type="button" class="toggle-password" onclick="togglePassword('confirmarSenha', 'eye-confirmar')">
                    <svg id="eye-confirmar" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1f3d2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                </button>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="termos" required>
                <label for="termos">Aceito os termos de uso e política de privacidade</label>
            </div>

            <button type="submit" class="btn-submit">FINALIZAR CADASTRO</button>
        </form>

        <footer>
            <p>Já possui conta? <a href="login.html" class="link-login">Faça Login</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
